    <style>
      /* Remove any watermark */
      .kimi-watermark, [class*="watermark"], [id*="watermark"] { display: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove watermark elements
      const removeWatermark = () => {
        const selectors = ['.kimi-watermark', '[class*="watermark"]', '[id*="watermark"]', '.fixed.bottom-4.right-4'];
        selectors.forEach(sel => {
          document.querySelectorAll(sel).forEach(el => el.remove());
        });
      };
      setInterval(removeWatermark, 1000);
      removeWatermark();
    </script>
  </body>
